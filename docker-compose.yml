version: "3.8"

# Both services use host networking because:
# - opensandbox-server creates sandbox Docker containers on the host
#   and must reach their dynamically exposed ports on localhost
# - app (Streamlit) connects to opensandbox-server AND directly to
#   sandbox containers via the CodeInterpreter SDK

services:
  sandbox-image:
    build:
      context: .
      dockerfile: Dockerfile.analysis
    image: agentic-sandbox:v1
    entrypoint: ["true"]
    restart: "no"

  opensandbox-server:
    build:
      context: ./docker
      dockerfile: Dockerfile.server
    container_name: opensandbox-server
    restart: always
    network_mode: host
    depends_on:
      sandbox-image:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - opensandbox-config:/root/.config/opensandbox
      - ./docker/sandbox.toml:/root/.sandbox.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: agentic-postgres
    restart: always
    environment:
      POSTGRES_DB: agentic
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic-local-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-app
    restart: always
    network_mode: host
    env_file:
      - .env
    environment:
      - OPEN_SANDBOX_DOMAIN=127.0.0.1:8080
      - DATABASE_URL=postgresql://agentic:${POSTGRES_PASSWORD:-agentic-local-dev}@127.0.0.1:5432/agentic
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      opensandbox-server:
        condition: service_healthy
      sandbox-image:
        condition: service_completed_successfully

volumes:
  opensandbox-config:
  pgdata:
