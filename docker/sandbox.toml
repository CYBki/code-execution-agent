[server]
host = "127.0.0.1"
port = 8080
log_level = "INFO"
# SECURITY: Change this key in production — do not use the default value.
# Set via OPEN_SANDBOX_API_KEY environment variable in .env
api_key = "CHANGE-ME-IN-PRODUCTION"
max_sandbox_timeout_seconds = 86400

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.9"

[docker]
network_mode = "bridge"
default_image = "agentic-sandbox:v1"
default_cpu = "1"
default_memory = "2Gi"
max_sandboxes = 12

[ingress]
mode = "direct"
